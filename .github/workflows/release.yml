name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v3.2.6-shafish.1
        required: true
        type: string
      release_name:
        description: Optional GitHub release title
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark the GitHub release as a pre-release
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: yt-dlp-webui_linux-amd64
          - goos: linux
            goarch: arm64
            output: yt-dlp-webui_linux-arm64
          - goos: linux
            goarch: arm
            goarm: "6"
            output: yt-dlp-webui_linux-armv6
          - goos: linux
            goarch: arm
            goarm: "7"
            output: yt-dlp-webui_linux-armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -o "${{ matrix.output }}" ./main.go

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error
          compression-level: 0

  docker:
    name: Build And Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker]
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_NAME: ${{ inputs.release_name }}

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -maxdepth 2 -exec cp {} dist/ \;

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Resolve release name
        id: names
        run: |
          if [ -n "${RELEASE_NAME}" ]; then
            echo "name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=yt-dlp-web-ui ${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ steps.names.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          body: |
            Container image:
            `ghcr.io/${{ github.repository }}:${{ inputs.tag }}`
          files: |
            dist/*
